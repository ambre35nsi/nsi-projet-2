<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <link href="style-ambre.css" rel="stylesheet">
    <title>Pac-Man NSI</title>
</head>
<body style="min-width: 700px">
        <!-- zone de jeu : canvas + message overlay -->
        <div id="gameContainer" style="position:relative; width:595px; margin:0 auto 10px;">
            <canvas id="game" width="595" height="595"></canvas>
            <div id="gameMessage" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:85%; text-align:center; font-size:22px; color:#fff; background:rgba(0,0,0,0.7); padding:8px; border-radius:6px; box-sizing:border-box; z-index:10;">
            </div>
        </div>
        <table>
            <tr>
                <td style="padding-right: 30px;">
                    <span>Carte</span>
                    <button id="btnCarte1" type="button" onclick="" style="width:40px">1</button>
                    <button id="btnCarte2" type="button" onclick="" style="width:40px">2</button>
                </td>
                <td>
                    <button id="btnStart" type="button" onclick="start();start2();">Start</button>
                    <button id="btnRestart" type="button" onclick="recommencer();" style="display:none;">Recommencer</button>
                </td>
                <td style="padding-left: 30px;">
                    <span id="spanPastilleMangee">0</span>
                    <span id="spanPastilleSeparation">/</span>
                    <span id="spanPastilleTotal">0</span>
                </td>
            </tr>
        </table>
    <!---lu en dernier-->
    <script src="pacman.js"></script>
    <script src="pacman-ambre.js"></script>
</body>
</html>
